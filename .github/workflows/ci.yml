name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel duplicate runs (e.g. when pushing again to a PR branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend · pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v
        env:
          # Dummies: las pruebas usan fixtures sintéticos, no llaman a Google.
          # Pero Pydantic Settings valida que existan al importar config.
          GOOGLE_SHEETS_API_KEY: ci_dummy
          SPREADSHEET_ID_GGAL: ci_dummy
          SPREADSHEET_ID_YPF: ci_dummy
          SPREADSHEET_ID_PAMP: ci_dummy

  frontend-build:
    name: Frontend · vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  backend-docker:
    name: Backend · docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t tradingstrategys-backend:ci ./backend
